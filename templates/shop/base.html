<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Магазин техники{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{% url 'home' %}" class="logo">🛒 Техномаркет</a>
            <div class="nav-links">
                <a href="{% url 'home' %}">Главная</a>
                <a href="{% url 'category_list' %}">📁 Категории</a>
                <a href="{% url 'cart_view' %}">🛍️ Корзина</a>
                <a href="{% url 'order_list' %}">📋 Заказы</a>
                <a href="{% url 'product_create' %}">➕ Товар</a>
            </div>
        </div>
    </nav>

    <main class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>
<footer class="footer">
    <div class="container">
        <p>© 2026 Техномаркет. Все права защищены.</p>
    </div>
</footer>
</html>
