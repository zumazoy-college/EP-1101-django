{% load static %}
<div class="product-card">
    {% if product.image %}
        <img src="{{ product.image.url }}" alt="{{ product.name }}" class="product-image">
    {% else %}
        <div class="product-image placeholder">📱</div>
    {% endif %}
    <h3>{{ product.name }}</h3>
    <p class="category">{{ product.category.name }}</p>
    <p class="price">{{ product.price }} ₽</p>
    <p class="stock">В наличии: {{ product.stock }} шт.</p>
    <div class="product-actions">
        <a href="{% url 'product_detail' product.id %}" class="btn btn-info">Подробнее</a>
        <a href="{% url 'add_to_cart' product.id %}" class="btn btn-primary">В корзину</a>
        <a href="{% url 'product_edit' product.id %}" class="btn btn-warning">✏️</a>
        <a href="{% url 'product_delete' product.id %}" class="btn btn-danger">🗑️</a>
    </div>
</div>
